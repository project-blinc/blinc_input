[package]
name = "blinc_input"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "Polling-style input state for Blinc sketches and canvases — bridges callback events to is_key_down / mouse_position / etc."
repository = "https://github.com/project-blinc/blinc_input"
readme = "README.md"
rust-version = "1.75"
keywords = ["input", "gamepad", "keyboard", "creative-coding", "blinc"]
categories = ["game-development", "gui"]

# Standalone package — not a member of the Blinc workspace.

[dependencies]
# Each Blinc dep declares both `path` (used during local dev) and `git`
# (used when this crate is fetched from its upstream repo by a
# downstream consumer). See `blinc_gltf/Cargo.toml` for the full
# rationale. Bump in lockstep with the corresponding upstream commits.
blinc_core = { path = "../../crates/blinc_core", git = "https://github.com/project-blinc/Blinc.git", rev = "4a7cef2acf9ba3d0c87dbf9be91c63e0a612f295" }
blinc_layout = { path = "../../crates/blinc_layout", git = "https://github.com/project-blinc/Blinc.git", rev = "4a7cef2acf9ba3d0c87dbf9be91c63e0a612f295" }
